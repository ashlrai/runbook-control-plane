name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up pinned pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.28.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Verify isolated signer distribution
        run: pnpm --filter @runbook/signer verify:dist

      - name: Reproduce standalone verifier bytes
        shell: bash
        run: |
          pnpm --filter @runbook/mcp build:standalone
          first_verifier_hash="$(shasum -a 256 packages/mcp/release/runbook-proof.mjs | awk '{print $1}')"
          pnpm --filter @runbook/mcp build:standalone
          second_verifier_hash="$(shasum -a 256 packages/mcp/release/runbook-proof.mjs | awk '{print $1}')"
          test "$first_verifier_hash" = "$second_verifier_hash"

      - name: Reproduce financial capability registry CLI bytes
        shell: bash
        run: |
          pnpm --filter @runbook/financial-capability-registry build:cli
          first_registry_hash="$(sha256sum packages/financial-capability-registry/dist/runbook-capabilities.mjs | awk '{print $1}')"
          pnpm --filter @runbook/financial-capability-registry build:cli
          second_registry_hash="$(sha256sum packages/financial-capability-registry/dist/runbook-capabilities.mjs | awk '{print $1}')"
          test "$first_registry_hash" = "$second_registry_hash"

      - name: Reproduce independent capability verifier distribution
        run: pnpm --filter @runbook/financial-capability-verifier-browser verify:reproducible

      - name: Reproduce public auth metadata fixture bytes
        shell: bash
        run: |
          pnpm --filter @runbook/public-auth-metadata build
          node packages/public-auth-metadata/scripts/build-robinhood-fixtures.mjs "$RUNNER_TEMP/public-auth-fixtures-first"
          node packages/public-auth-metadata/scripts/build-robinhood-fixtures.mjs "$RUNNER_TEMP/public-auth-fixtures-second"
          diff -r packages/public-auth-metadata/fixtures/robinhood/v1/expected "$RUNNER_TEMP/public-auth-fixtures-first"
          diff -r "$RUNNER_TEMP/public-auth-fixtures-first" "$RUNNER_TEMP/public-auth-fixtures-second"

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level moderate

      - name: Verify frozen conformance corpus
        working-directory: conformance
        run: shasum -a 256 -c SHA256SUMS

      - name: Verify generated assets did not modify source
        run: git diff --exit-code

  sandbox-integration:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up pinned pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.28.2
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull exact sandbox runtime image
        run: docker pull node:22-alpine@sha256:16e22a550f3863206a3f701448c45f7912c6896a62de43add43bb9c86130c3e2

      - name: Test sandbox package
        run: pnpm --filter @runbook/financial-bench-sandbox test

      - name: Typecheck sandbox package
        run: pnpm --filter @runbook/financial-bench-sandbox typecheck

      - name: Build sandbox package
        run: pnpm --filter @runbook/financial-bench-sandbox build

      - name: Reproduce standalone sandbox host runner bytes
        shell: bash
        run: |
          first_runner_hash="$(sha256sum packages/financial-bench-sandbox/dist/host-runner.mjs | awk '{print $1}')"
          pnpm --filter @runbook/financial-bench-sandbox build:runner
          second_runner_hash="$(sha256sum packages/financial-bench-sandbox/dist/host-runner.mjs | awk '{print $1}')"
          test "$first_runner_hash" = "$second_runner_hash"

      - name: Run repository-owned Docker sandbox fixtures
        env:
          RUNBOOK_DOCKER_INTEGRATION: "1"
        run: pnpm --filter @runbook/financial-bench-sandbox test:docker
