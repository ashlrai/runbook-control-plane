minimumReleaseAge: 10080
minimumReleaseAgeExclude:
  - "postcss@8.5.21"
trustPolicy: no-downgrade
trustPolicyExclude:
  # eslint-config-next@16.2.10 requires this mature 3.x line, whose releases
  # predate npm provenance. Keep the exception exact instead of disabling the
  # workspace-wide no-downgrade policy.
  - "eslint-import-resolver-typescript@3.10.1"
  # eslint-plugin-react's semver 6 compatibility branch was last released in
  # 2023, before that branch used npm provenance. Retain its registry-integrity
  # pin while exempting only this exact mature version.
  - "semver@6.3.1"
blockExoticSubdeps: true
overrides:
  "@hono/node-server": "2.0.11"
  postcss: "8.5.21"
  sharp: "0.35.3"
  undici-types: "6.19.2"
  vite: "8.1.4"

packages:
  - "apps/*"
  - "packages/*"
